name: meli

services:
  # PostgreSQL Database
  postgres-db:
    image: postgres:16-alpine
    container_name: meli-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres" ]
      interval: 3s
      timeout: 3s
      retries: 5

  # Items Service (Go)
  items-service:
    build:
      context: ./items-service
      dockerfile: Dockerfile
    image: meli-items
    environment:
      - DB_HOST=postgres-db
      - DB_USER=postgres
      - DB_PASSWORD=postgrespassword
      - DB_NAME=items_db
      - DB_PORT=5432
      - DB_SSLMODE=disable
      - PORT=80
    deploy:
      replicas: 2
    depends_on:
      postgres-db:
        condition: service_healthy

  # Orders Service (Go)
  orders-service:
    build:
      context: ./orders-service
      dockerfile: Dockerfile
    image: meli-orders
    environment:
      - DB_HOST=postgres-db
      - DB_USER=postgres
      - DB_PASSWORD=postgrespassword
      - DB_NAME=orders_db
      - DB_PORT=5432
      - DB_SSLMODE=disable
      - PORT=80
      - ITEMS_SERVICE_URL=http://internal-balancer
    deploy:
      replicas: 2
    depends_on:
      postgres-db:
        condition: service_healthy

  # Auth Service (Go)
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    image: meli-auth
    container_name: meli-auth
    environment:
      - PORT=8083
      - JWT_SECRET=supersecretmelikey
    ports:
      - "8083:8083"

  # Gateway Instance A (FastAPI)
  gateway-a:
    build:
      context: ./balancer-demo
      dockerfile: Dockerfile
    image: meli-gateway
    container_name: meli-gateway-a
    environment:
      - INSTANCE_NAME=Instancia-A
      - ORDERS_SERVICE_URL=http://internal-balancer
      - ITEMS_SERVICE_URL=http://internal-balancer
    expose:
      - "8000"

  # Gateway Instance B (FastAPI)
  gateway-b:
    build:
      context: ./balancer-demo
      dockerfile: Dockerfile
    image: meli-gateway
    container_name: meli-gateway-b
    environment:
      - INSTANCE_NAME=Instancia-B
      - ORDERS_SERVICE_URL=http://internal-balancer
      - ITEMS_SERVICE_URL=http://internal-balancer
    expose:
      - "8000"

  # Internal Load Balancer
  internal-balancer:
    image: nginx:alpine
    container_name: meli-internal-balancer
    volumes:
      - ./internal-balancer/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - orders-service
      - items-service

  # Nginx Edge Balancer
  balancer:
    image: nginx:alpine
    container_name: meli-balancer
    ports:
      - "8080:8080"
    volumes:
      - ./balancer-demo/nginx.docker.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway-a
      - gateway-b
      - auth-service
      - internal-balancer

  # Log Database (Loki)
  loki:
    image: grafana/loki:latest
    container_name: meli-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  # Log Collector (Promtail)
  promtail:
    image: grafana/promtail:latest
    container_name: meli-promtail
    volumes:
      - ./logging/promtail-config.yaml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  # Metrics & Logs Viewer (Grafana)
  grafana:
    image: grafana/grafana:latest
    container_name: meli-grafana
    ports:
      - "8003:3000"
    volumes:
      - ./logging/datasource.yaml:/etc/grafana/provisioning/datasources/datasource.yaml:ro
      - ./logging/dashboard-provider.yaml:/etc/grafana/provisioning/dashboards/dashboard-provider.yaml:ro
      - ./logging/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - loki

  # pgAdmin (Database UI)
  pgadmin:
    image: dpage/pgadmin4
    container_name: meli-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: postgres
    ports:
      - "5050:80"
    depends_on:
      - postgres-db

volumes:
  postgres_data:
