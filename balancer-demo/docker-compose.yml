version: '3.8'

services:
  # Instancia A de FastAPI
  gateway-a:
    build: .
    environment:
      - INSTANCE_NAME=Instancia-A
    expose:
      - "8000"

  # Instancia B de FastAPI
  gateway-b:
    build: .
    environment:
      - INSTANCE_NAME=Instancia-B
    expose:
      - "8000"

  # Servidor Nginx que balancea el tráfico
  balancer:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.docker.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway-a
      - gateway-b
