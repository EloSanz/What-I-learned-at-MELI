events {
    worker_connections 1024;
}

http {
    # Definimos el grupo de servidores backend (FastAPI)
    upstream gateway_servers {
        # Por defecto, Nginx balancea usando Round Robin (uno y uno)
        server 127.0.0.1:8001;
        server 127.0.0.1:8002;
    }

    server {
        listen 8080;
        server_name localhost;

        # Redirigimos las peticiones del path específico /gateway
        location /gateway {
            # Responder inmediatamente a peticiones preflight (OPTIONS)
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # Añadir cabeceras CORS para peticiones GET y POST reales
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

            proxy_pass http://gateway_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Opcional: una página por defecto si entras a /
        location / {
            return 200 "Nginx Balancer activo. Accede a /gateway o /gateway/info para ver el balanceo en accion.\n";
            add_header Content-Type text/plain;
        }
    }
}
