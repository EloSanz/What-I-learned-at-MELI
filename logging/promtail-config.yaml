server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Auto-discover Docker containers via socket
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Ignore infrastructure containers
      - source_labels: ['__meta_docker_container_name']
        regex: '/meli-(loki|promtail|grafana)'
        action: drop
      # Rename container label for readability
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'job'
      # Capture stdout/stderr stream
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      # Capture docker-compose service name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
