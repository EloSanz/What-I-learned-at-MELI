server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Recolector automático para todos los contenedores Docker mediante el Socket de Docker
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Ignorar contenedores de infraestructura (Loki, Promtail, Grafana)
      - source_labels: ['__meta_docker_container_name']
        regex: '/meli-(loki|promtail|grafana)'
        action: drop
      # Renombrar la etiqueta del contenedor para que sea legible
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'job'
      # Capturar si el log es de stdout o stderr
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      # Capturar el nombre del servicio en docker-compose
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
