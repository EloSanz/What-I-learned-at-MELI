events {
    worker_connections 1024;
}

http {
    # Active-Passive Failover Strategy for Orders
    upstream orders_backend {
        server meli-orders-service-1:80;
        server meli-orders-service-2:80 backup;
    }

    # Active-Passive Failover Strategy for Items
    upstream items_backend {
        server meli-items-service-1:80;
        server meli-items-service-2:80 backup;
    }
    server {
        listen 80;
        server_name localhost;

        location /api/orders {
            proxy_pass http://orders_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/items {
            proxy_pass http://items_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
