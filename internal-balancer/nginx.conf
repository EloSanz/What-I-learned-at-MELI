events {
    worker_connections 1024;
}

http {
    # Resolve using Docker's internal DNS to dynamically discover scaled containers
    resolver 127.0.0.11 valid=5s;

    # Upstream for Orders Service
    upstream orders_backend {
        server orders-service;
    }

    # Upstream for Items Service
    upstream items_backend {
        server items-service;
    }

    server {
        listen 80;
        server_name localhost;

        location /api/orders {
            proxy_pass http://orders_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/items {
            proxy_pass http://items_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
